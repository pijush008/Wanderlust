# ================= NGINX LOAD BALANCER CONFIGURATION =================
#
# Architecture:
#   Client → Nginx (port 80/443) → Upstream Pool (Node.js workers)
#
# Features:
#   - Round-robin load balancing across multiple Node.js instances
#   - WebSocket support (Socket.IO upgrade)
#   - Static file serving (bypasses Node.js entirely)
#   - Gzip compression
#   - Rate limiting (DDoS protection)
#   - SSL termination (HTTPS)
#   - Health check-based routing
#   - Connection pooling
#   - Request buffering
#
# Usage:
#   sudo cp nginx/nginx.conf /etc/nginx/sites-available/wanderlust
#   sudo ln -s /etc/nginx/sites-available/wanderlust /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# ================= UPSTREAM (Load Balancing Pool) =================
upstream wanderlust_backend {
    # Load balancing method: least_conn (sends to least busy worker)
    least_conn;

    # Node.js instances (add more for horizontal scaling)
    server 127.0.0.1:3000 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:3001 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:3002 weight=1 max_fails=3 fail_timeout=30s;
    server 127.0.0.1:3003 weight=1 max_fails=3 fail_timeout=30s;

    # Keepalive connections to backend (connection pooling)
    keepalive 64;
}

# ================= RATE LIMITING =================
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
limit_req_zone $binary_remote_addr zone=search_limit:10m rate=20r/s;

# ================= SERVER BLOCK =================
server {
    listen 80;
    server_name wanderlust.example.com localhost;

    # Redirect HTTP to HTTPS (uncomment in production)
    # return 301 https://$host$request_uri;

    # ---- GZIP COMPRESSION ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;
    gzip_min_length 1000;

    # ---- SECURITY HEADERS ----
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ---- CLIENT BODY SIZE (for image uploads) ----
    client_max_body_size 10M;

    # ---- STATIC FILES (served directly by Nginx — bypasses Node.js) ----
    location /css/ {
        alias /media/pijush/32f56b45-6498-4666-b0ad-a7737108fb12/Major_project/public/css/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /js/ {
        alias /media/pijush/32f56b45-6498-4666-b0ad-a7737108fb12/Major_project/public/js/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /images/ {
        alias /media/pijush/32f56b45-6498-4666-b0ad-a7737108fb12/Major_project/public/images/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ---- HEALTH CHECK (for load balancer probes) ----
    location /health {
        proxy_pass http://wanderlust_backend;
        proxy_set_header Host $host;
        access_log off;
    }

    # ---- WEBSOCKET (Socket.IO) ----
    location /socket.io/ {
        proxy_pass http://wanderlust_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket timeout (keep alive)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # ---- API ROUTES (rate limited) ----
    location /api/ {
        limit_req zone=api_limit burst=50 nodelay;

        proxy_pass http://wanderlust_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Timeouts
        proxy_connect_timeout 10s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ---- LOGIN/SIGNUP (strict rate limit) ----
    location ~ ^/(login|signup) {
        limit_req zone=login_limit burst=3 nodelay;

        proxy_pass http://wanderlust_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ---- SEARCH (moderate rate limit) ----
    location /search {
        limit_req zone=search_limit burst=30 nodelay;

        proxy_pass http://wanderlust_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }

    # ---- ALL OTHER ROUTES ----
    location / {
        proxy_pass http://wanderlust_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Buffering
        proxy_buffering on;
        proxy_buffer_size 128k;
        proxy_buffers 4 256k;
    }

    # ---- ERROR PAGES ----
    error_page 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
        internal;
    }
}

