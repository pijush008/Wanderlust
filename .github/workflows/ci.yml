name: CI — Build & Verify

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend - Install & Verify
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Verify backend syntax
        run: node -c server.js

      - name: Run linter (if exists)
        run: npm run lint --if-present
        continue-on-error: true

  frontend:
    name: Frontend - Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build production bundle
        env:
          VITE_API_URL: https://wanderlust-quyn.onrender.com/api
          VITE_MAPBOX_TOKEN: ${{ secrets.VITE_MAPBOX_TOKEN }}
          VITE_RAZORPAY_KEY_ID: ${{ secrets.VITE_RAZORPAY_KEY_ID }}
        run: npm run build

      - name: Check bundle size
        run: |
          echo "Bundle size:"
          du -sh dist/
          ls -lah dist/assets/ | head -10

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check for secrets in code
        run: |
          # Scan for accidentally committed API keys
          if grep -rE "sk-[a-zA-Z0-9]{40,}|rzp_live_[a-zA-Z0-9]+|AIza[a-zA-Z0-9]{30,}" \
            --include="*.js" --include="*.jsx" --include="*.json" \
            --exclude-dir=node_modules --exclude-dir=.git . ; then
            echo "❌ Possible secret detected in code!"
            exit 1
          fi
          echo "✅ No secrets found in code"

      - name: Check .env not committed
        run: |
          if git ls-files | grep -E "(^|/)\.env$" ; then
            echo "❌ .env file is tracked in git!"
            exit 1
          fi
          echo "✅ No .env files tracked"

      - name: Backend npm audit
        run: cd backend && npm audit --audit-level=high --omit=dev
        continue-on-error: true

      - name: Frontend npm audit
        run: cd frontend && npm audit --audit-level=high --omit=dev
        continue-on-error: true
