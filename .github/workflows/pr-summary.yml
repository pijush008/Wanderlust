name: PR Summary

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get changed files
        id: changes
        run: |
          echo "files<<EOF" >> $GITHUB_OUTPUT
          git diff --name-only origin/${{ github.base_ref }}...HEAD | head -20 >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const files = `${{ steps.changes.outputs.files }}`.split('\n').filter(f => f);
            const body = `## 📋 PR Summary

            **Changed files** (${files.length}):
            \`\`\`
            ${files.slice(0, 15).join('\n')}${files.length > 15 ? '\n...and ' + (files.length - 15) + ' more' : ''}
            \`\`\`

            ✅ Once CI passes and review approves, this will auto-deploy to:
            - **Frontend**: Vercel
            - **Backend**: Render

            _This comment was auto-generated by CI._`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
