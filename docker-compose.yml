services:
  # ================= WEB APPLICATION =================
  web:
    build: .
    container_name: wanderlust-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - ATLASDB_URL=mongodb://mongo:27017/wanderlust
      - SESSION_SECRET=${SESSION_SECRET}
      - CLOUD_NAME=${CLOUD_NAME}
      - CLOUD_API_KEY=${CLOUD_API_KEY}
      - CLOUD_API_SECRET=${CLOUD_API_SECRET}
      - MAP_TOKEN=${MAP_TOKEN}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - REDIS_URL=redis://redis:6379
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wanderlust-network
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # ================= BACKGROUND WORKER =================
  worker:
    build: .
    container_name: wanderlust-worker
    restart: unless-stopped
    command: ["node", "worker.js"]
    environment:
      - NODE_ENV=production
      - ATLASDB_URL=mongodb://mongo:27017/wanderlust
      - REDIS_URL=redis://redis:6379
      - OPENAI_API_KEY=${OPENAI_API_KEY}
    depends_on:
      mongo:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - wanderlust-network

  # ================= MONGODB =================
  mongo:
    image: mongo:7
    container_name: wanderlust-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - wanderlust-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ================= REDIS =================
  redis:
    image: redis:7-alpine
    container_name: wanderlust-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru
    networks:
      - wanderlust-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ================= NGINX (Load Balancer) =================
  nginx:
    image: nginx:alpine
    container_name: wanderlust-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/docker-nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      web:
        condition: service_healthy
    networks:
      - wanderlust-network

# ================= VOLUMES =================
volumes:
  mongo-data:
    driver: local
  redis-data:
    driver: local

# ================= NETWORKS =================
networks:
  wanderlust-network:
    driver: bridge
